name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

env:
  PYTEST_ON_CI: True

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  stability-days:
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR does not have stability-days label
        if: >-
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'stability-days')
        run: |
          echo "Pull request has 'stability-days' label. Failing the check." 
          exit 1

  code-quality-checks:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Python and install dependencies
        uses: ./.github/actions/setup-python

      - name: set PY
        run: echo "PY=$(python -VV | sha256sum | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Configure pre-commit cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ env.PY }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit hooks
        run: uv run pre-commit install

      - name: Run code quality checks
        run: SKIP=no-commit-to-branch uv run pre-commit run --all-files


  ci-success-check:
    needs:
      [
        stability-days,
        code-quality-checks
      ]
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check all job results
        run: |
          echo "Stability Days Label Check: ${{ needs.stability-days.result }}"
          echo "Code Quality: ${{ needs.code-quality-checks.result }}"

           if [[ "${{ needs.stability-days.result }}" != "success" ]] || \
             [[ "${{ needs.code-quality-checks.result }}" != "success" ]]; then
            echo "One or more CI jobs failed, were cancelled, or skipped. Marking as failed."
            exit 1
          fi
          echo "All CI jobs succeeded."

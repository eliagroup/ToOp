name: docs

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["release"]
    types:
      - completed

permissions: {}

env:
  CHANGELOG_FILE: "docs/changelog.md"

concurrency:
  group: docs-gh-pages
  cancel-in-progress: false

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    environment: docs
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0 # fetch full history
          fetch-tags: true # ensure tags are fetched
          persist-credentials: true # keeps GITHUB_TOKEN set up for pushing back to remote
          ssh-key: ${{ secrets.RELEASE_KEY }}

      - name: Configure git profile
        uses: ./.github/actions/configure-git-profile

      - name: "Set up Python"
        uses: ./.github/actions/setup-python

      - name: Remember initial checkout
        run: |
          echo "INITIAL_GIT_REF=$GITHUB_SHA" >> "$GITHUB_ENV"

      - name: Build documentation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          echo "Getting stable releases"
          releases_json=$(gh release list --exclude-drafts --exclude-pre-releases --limit 200 --json tagName)
          latest_tag=$(echo "$releases_json" | jq -r '.[0].tagName // empty')

          if [ -z "$latest_tag" ]; then
            echo "No stable GitHub releases found. Exiting without deployment."
            exit 0
          fi

          echo "Latest stable release tag: $latest_tag"
          echo "$releases_json" | jq -r 'reverse | .[].tagName' | while IFS= read -r release_tag; do
              [ -z "$release_tag" ] && continue

              echo "Building documentation for tag $release_tag"

              echo "Checking out commit tag"
              git checkout --force "$release_tag"

              echo "Syncing documentation dependencies for tag $release_tag"
              uv sync --frozen --only-group doc

              mkdir -p "$(dirname "$CHANGELOG_FILE")"

              echo "Adding changelog to mkdocs nav"
              # NOTE:
              # - We are in a detached HEAD after checking out the tag above.
              # - The change to mkdocs.yml is temporary and only used for this build.
              # - It is discarded when the workflow checks out the next tag or the gh-pages branch.
              # - We intentionally mutate mkdocs.yml in-place here instead of maintaining a separate config file.
              echo "  - Changelog: changelog.md" >> mkdocs.yml

              echo "Fetching release url"
              url=$(gh release view "$release_tag" --json url | jq -r '.url')
              printf '# [%s](%s)\n' "$release_tag" "$url" > "$CHANGELOG_FILE"

              echo "Fetching release body"
              gh release view "$release_tag" --json body | jq -r '.body' >> "$CHANGELOG_FILE"

              if [ "$release_tag" = "$latest_tag" ]; then
                echo "Writing to gh-pages branch with latest alias"
                uv run mike deploy --update-aliases "$release_tag" latest
              else
                echo "Writing to gh-pages branch"
                uv run mike deploy "$release_tag"
              fi
          done

      - name: Set default version tag
        run: |
          uv run mike set-default latest --allow-empty

      - name: Publish documentation
        run: |
          git checkout gh-pages --force || git checkout -b gh-pages origin/gh-pages
          git push origin gh-pages

      - name: Restore initial checkout for post-job cleanup
        if: always()
        run: |
          git checkout --force "$INITIAL_GIT_REF"

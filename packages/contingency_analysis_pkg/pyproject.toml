[project]
name = "toop_engine_contingency_analysis"
dynamic = ["version", "dependencies"]
description = "Python Package to run a contingency analysis in pandapower or pypowsybl"
authors = [
    {name = "Nico Westerbeck", email = "Nico.Westerbeck@50hertz.com"},
    {name = "Leonard Hilfrich", email = "Leonard.Hilfrich@50hertz.com"},
    {name = "Benjamin Petrick", email = "Benjamin.Petrick@externel.be"},
]

readme = "README.md"

keywords = [
    "Contingency Analysis",
    "N-1",
    "Exceptional Contingencies",
    "Outage",
    "Grid",
    "Security Analysis",
    "Parallel N-1",
]
classifiers=[
        'Development Status :: 4 - Beta',
        'Environment :: Console',
        'Intended Audience :: Developers',
        'Intended Audience :: Education',
        'Intended Audience :: Science/Research',
        'License :: OSI Approved :: Mozilla Public License 2.0 (MPL 2.0)',
        'Natural Language :: English',
        'Operating System :: OS Independent',
        'Programming Language :: Python',
        'Programming Language :: Python :: 3.13'
]

requires-python = ">=3.13,<3.14"

[tool.hatch.metadata.hooks.uv-dynamic-versioning]
dependencies = [
    "pandera[polars] (>=0.29,<0.30.0)",
    "ray (>=2.42.1,<2.55.0)",
    "beartype (>=0.22.0,<0.23.0)",
    "numpy (>=1.26.0,<2.5.0)",
    "pandas (>=2.2.3,<2.4.0)",
    "pydantic (>=1.10.3,<2.13.0)",
    "confluent-kafka (>=2.3.0,<2.14.0)",
    "logbook (>=1.8.1,<1.9.0)",
    "toop_engine_interfaces=={{ version }}",
    "toop_engine_grid_helpers=={{ version }}",
    "tyro (>=0.8.8,<1.1.0)",
    "polars>=1.33.0,<1.39.0",
    "orjson>=3.11.3,<3.12.0",
    "pyarrow>=21.0.0,<23.1.0",
]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[project.optional-dependencies]
pypowsybl = ["pypowsybl>=1.13.0,<1.15.0"]
pandapower = ["pandapower>=3.0.0,<3.3.0"]

[dependency-groups]
dev = [
    "pep8-naming<0.16.0",
    "pre-commit<4.6.0",
    "pre-commit-hooks<6.1.0",
    "pytest<9.1.0",
    "pytest-cov<7.1.0",
    "pytest-dotenv<0.6.0",
    "pytest-mock<3.16.0",
    "pytest-timeout<2.5.0",
    "pytest-xdist>=3.8.0,<3.9.0",
    "ipykernel>=6.25.2,<7.3.0",
    "jupyter>=1.0.0,<1.2.0",
    "seaborn>=0.13.0,<0.14.0",
    "plotly>=3.0.0,<6.7.0",
    "openpyxl>=3.1.2,<3.2.0",
    "ruff<0.16.0",
    "types-confluent-kafka>=1.3.3,<1.5.0",
    "pytest-logbook>=1.2.0,<1.3.0",
    "pypowsybl-jupyter>=1.0.0,<1.4.0",
    "docker>=7.1.0,<7.2.0",
    "numba>=0.61.2,<0.65.0",
    "orjson>=3.11.3,<3.12.0",
]

[tool.uv.sources]
toop_engine_interfaces = { path = "../interfaces_pkg", editable = true }
toop_engine_grid_helpers = { path = "../grid_helpers_pkg", editable = true }

[tool.uv-secure.ignore_packages]
ray = [] # Ignore issues with all versions of the ray package

[project]
name = "toop_engine_dc_solver"
dynamic = ["version", "dependencies"]
description = "Brute-force DC topological remedial actions"

readme = "README.md"
keywords = [
    "topological remedial actions",
    "DC loadflow",
    "PTDF",
    "BSDF",
    "LODF",
]
classifiers=[
        'Development Status :: 1 - Planning',
        'Environment :: Console',
        'Intended Audience :: Developers',
        'Intended Audience :: Education',
        'Intended Audience :: Science/Research',
        'License :: OSI Approved :: Mozilla Public License 2.0 (MPL 2.0)',
        'Natural Language :: English',
        'Operating System :: OS Independent',
        'Programming Language :: Python',
    'Programming Language :: Python :: 3.14'
]
requires-python = ">=3.14,<3.15"

[tool.hatch.metadata.hooks.uv-dynamic-versioning]
dependencies = [
    "numpy (>=2.1.0,<2.4.0)",
    "pandas[hdf5] (>=2.2.3,<3.0.0)",
    "scipy (>=1.11.3,<2.0.0)",
    "h5py (>=3.14.0,<4.0.0)",
    "jaxtyping (>=0.3.10,<0.4.0)",
    "jax (>=0.8.3,<0.9.0)",
    "chex (>=0.1.91,<0.2.0)",
    "beartype (>=0.22.0,<0.23.0)",
    "equinox (>=0.13.8,<0.14.0)",
    "flax (>=0.12.6,<0.13.0)",
    "jax-dataclasses (>=1.6.3,<2.0.0)",
    "tqdm (>=4.66.1,<5.0.0)",
    "numba (>=0.65.0,<0.66.0)",
    "overrides (>=7.7.0,<8.0.0)",
    "pypowsybl (>=1.15.0,<2.0.0)",
    "pydantic (>=1.10.3,<3.0.0)",
    "numpydantic (>=1.6.4,<2.0.0)",
    "matpowercaseframes (>=1.0.8,<2.0.0)",
    "tyro (>=0.8.8,<0.9.0)",
    "ray (>=2.42.1,<3.0.0)",
    "pandera (>=0.26.1,<0.27.0)",
    "kafka (>=1.3.5,<2.0.0)",
    "confluent-kafka (>=2.3.0,<3.0.0)",
    "toop_engine_contingency_analysis=={{ version }}",
    "toop_engine_interfaces=={{ version }}",
    "toop_engine_grid_helpers=={{ version }}",
    "equinox (>=0.13.8,<0.14.0)"
]
[project.optional-dependencies]
pandapower = ["pandapower>=3.4.0", "lxml>=5.0.0"]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[dependency-groups]
dev = [
    "pep8-naming",
    "pre-commit",
    "pre-commit-hooks",
    "pytest",
    "pytest-cov",
    "pytest-env",
    "pytest-mock",
    "pytest-timeout",
    "pytest-xdist>=3.8.0",
    "ipykernel>=6.25.2",
    "jupyter>=1.0.0",
    "seaborn>=0.13.0",
    "plotly>=6.7.0",
    "openpyxl>=3.1.2",
    "ruff",
    "types-confluent-kafka>=1.3.3",
    "pypowsybl-jupyter>=1.0.0",
    "docker>=7.1.0",
    "structlog (>=24.4.0,<25.0.0)",
]

[tool.pytest_env]
ENABLE_BEARTYPE="true"

[tool.uv.sources]
toop_engine_interfaces = { path = "../interfaces_pkg", editable = true }
toop_engine_grid_helpers = { path = "../grid_helpers_pkg", editable = true }
toop_engine_contingency_analysis = { path = "../contingency_analysis_pkg", editable = true }


[tool.uv-secure.vulnerability_criteria]
show_severity = true # Defaults to false. Set true to show severity in columns output.
ignore_unfixed = true

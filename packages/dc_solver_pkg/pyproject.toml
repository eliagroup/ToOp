[project]
name = "toop_engine_dc_solver"
dynamic = ["version", "dependencies"]
description = "Brute-force DC topological remedial actions"

readme = "README.md"
keywords = [
    "topological remedial actions",
    "DC loadflow",
    "PTDF",
    "BSDF",
    "LODF",
]
classifiers=[
        'Development Status :: 1 - Planning',
        'Environment :: Console',
        'Intended Audience :: Developers',
        'Intended Audience :: Education',
        'Intended Audience :: Science/Research',
        'License :: OSI Approved :: Mozilla Public License 2.0 (MPL 2.0)',
        'Natural Language :: English',
        'Operating System :: OS Independent',
        'Programming Language :: Python',
        'Programming Language :: Python :: 3',
        'Programming Language :: Python :: 3.7',
        'Programming Language :: Python :: 3.8',
        'Programming Language :: Python :: 3.9',
        'Programming Language :: Python :: 3.13',
        'Programming Language :: Python :: 3.13'
]
requires-python = ">=3.13,<3.14"

[tool.hatch.metadata.hooks.uv-dynamic-versioning]
dependencies = [
    "numpy (>=1.26.0,<2.5.0)",
    "pandas[hdf5] (>=2.2.3,<2.4.0)",
    "scipy (>=1.11.3,<1.18.0)",
    "h5py (==3.12.1)",
    "jaxtyping (>=0.2.22,<0.4.0)",
    "jax (>=0.5.3,<0.10.0)",
    "chex (>=0.1.83,<0.2.0)",
    "beartype (>=0.22.0,<0.23.0)",
    "equinox (>=0.11.0,<0.14.0)",
    "jax-dataclasses (>=1.5.1,<1.7.0)",
    "tqdm (>=4.66.1,<4.68.0)",
    "numba (>=0.59.0,<0.65.0)",
    "overrides (>=7.7.0,<7.8.0)",
    "pypowsybl (>=1.13.0,<1.15.0)",
    "pydantic (>=1.10.3,<2.13.0)",
    "numpydantic (>=1.6.4,<1.9.0)",
    "matpowercaseframes (>=1.0.8,<2.1.0)",
    "tyro (>=0.8.8,<1.1.0)",
    "ray (>=2.42.1,<2.55.0)",
    "pandera (>=0.29,<0.30.0)",
    "kafka (>=1.3.5,<1.4.0)",
    "confluent-kafka (>=2.3.0,<2.14.0)",
    "logbook (>=1.8.1,<1.9.0)",
    "toop_engine_contingency_analysis=={{ version }}",
    "toop_engine_interfaces=={{ version }}",
    "toop_engine_grid_helpers=={{ version }}",
    "pandapower (>=3.0.0,<3.3.0)",
]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[dependency-groups]
dev = [
    "pep8-naming<0.16.0",
    "pre-commit<4.6.0",
    "pre-commit-hooks<6.1.0",
    "pytest<9.1.0",
    "pytest-cov<7.1.0",
    "pytest-dotenv<0.6.0",
    "pytest-mock<3.16.0",
    "pytest-timeout<2.5.0",
    "pytest-xdist>=3.8.0,<3.9.0",
    "ipykernel>=6.25.2,<7.3.0",
    "jupyter>=1.0.0,<1.2.0",
    "seaborn>=0.13.0,<0.14.0",
    "plotly>=3.0.0,<6.7.0",
    "openpyxl>=3.1.2,<3.2.0",
    "ruff<0.16.0",
    "types-confluent-kafka>=1.3.3,<1.5.0",
    "pytest-logbook>=1.2.0,<1.3.0",
    "pypowsybl-jupyter>=1.0.0,<1.4.0",
    "docker>=7.1.0,<7.2.0",
]

[tool.uv.sources]
toop_engine_interfaces = { path = "../interfaces_pkg", editable = true }
toop_engine_grid_helpers = { path = "../grid_helpers_pkg", editable = true }
toop_engine_contingency_analysis = { path = "../contingency_analysis_pkg", editable = true }


[tool.uv-secure.ignore_packages]
ray = [] # Ignore issues with all versions of the ray package

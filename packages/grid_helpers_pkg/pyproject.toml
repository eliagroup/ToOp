[project]
name = "toop_engine_grid_helpers"
dynamic = ["version", "dependencies"]
description = "Helper functions for pandapower and pypowsybl"

readme = "README.md"
keywords = [
    "pandapower helpers",
    "powsybl helpers",
    "example grids",
    "single line diagram",
    "loadflow parameters"
]
classifiers=[
        'Development Status :: 4 - Beta',
        'Environment :: Console',
        'Intended Audience :: Developers',
        'Intended Audience :: Science/Research',
        'License :: OSI Approved :: Mozilla Public License 2.0 (MPL 2.0)',
        'Natural Language :: English',
        'Operating System :: OS Independent',
        'Programming Language :: Python',
        'Programming Language :: Python :: 3.13'
]

requires-python = ">=3.13,<3.14"

[tool.hatch.metadata.hooks.uv-dynamic-versioning]
dependencies = [
    "numpy (>=1.26.0,<2.5.0)",
    "pandas[hdf5] (>=2.2.3,<2.4.0)",
    "jaxtyping (>=0.2.22,<0.4.0)",
    "beartype (>=0.22.0,<0.23.0)",
    "kafka (>=1.3.5,<1.4.0)",
    "toop_engine_interfaces=={{ version }}",
    "polars>=1.33.0,<1.39.0",
    "orjson>=3.11.3,<3.12.0",
    "pyarrow>=21.0.0,<23.1.0",
]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[project.optional-dependencies]
pypowsybl = ["pypowsybl>=1.13.0,<1.15.0"]
pandapower = ["pandapower>=3.0.0,<3.3.0"]

[dependency-groups]
dev = [
    "pep8-naming<0.16.0",
    "pre-commit<4.6.0",
    "pre-commit-hooks<6.1.0",
    "pytest<9.1.0",
    "pytest-cov<7.1.0",
    "pytest-dotenv<0.6.0",
    "pytest-mock<3.16.0",
    "pytest-timeout<2.5.0",
    "pytest-xdist>=3.8.0,<3.9.0",
    "ipykernel>=6.25.2,<7.3.0",
    "jupyter>=1.0.0,<1.2.0",
    "seaborn>=0.13.0,<0.14.0",
    "plotly>=3.0.0,<6.7.0",
    "openpyxl>=3.1.2,<3.2.0",
    "ruff<0.16.0",
    "types-confluent-kafka>=1.3.3,<1.5.0",
    "pytest-logbook>=1.2.0,<1.3.0",
    "pypowsybl-jupyter>=1.0.0,<1.4.0",
    "docker>=7.1.0,<7.2.0",
    "matpowercaseframes>=1.1.4,<2.1.0",
    "numba>=0.61.2,<0.65.0",
]

[tool.uv.sources]
toop_engine_interfaces = { path = "../interfaces_pkg", editable = true }

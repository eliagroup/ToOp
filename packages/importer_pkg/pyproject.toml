[project]
name = "toop_engine_importer"
dynamic = ["version", "dependencies"]
description = "Gridmodel importer"
authors = [
    {name = "Nico Westerbeck", email = "Nico.Westerbeck@50hertz.com"},
    {name = "Benjamin Petrick", email = "Benjamin.Petrick@externel.be"},
    {name = "Leonard Hilfrich", email = "Leonard.Hilfrich@50hertz.com"}
]
readme = "README.md"

keywords = [
    "CGMES",
    "UCTE",
    "grid model import",
    "grid analysis",
    "grid topology"
]
classifiers=[
        'Development Status :: 4 - Beta',
        'Environment :: Console',
        'Intended Audience :: Developers',
        'Intended Audience :: Education',
        'Intended Audience :: Science/Research',
        'License :: OSI Approved :: Mozilla Public License 2.0 (MPL 2.0)',
        'Natural Language :: English',
        'Operating System :: OS Independent',
        'Programming Language :: Python',
        'Programming Language :: Python :: 3.13'
]

requires-python = ">=3.13,<3.14"

[tool.hatch.metadata.hooks.uv-dynamic-versioning]
dependencies = [
    "pandapower (>=3.0.0,<3.3.0)",
    "numba (>=0.59.0,<0.65.0)",
    "sqlalchemy (>=1.4.17,<2.1.0)",
    "openpyxl (>=3.1.2,<3.2.0)",
    "plotly (>=3.0.0,<6.7.0)",
    "pypowsybl (>=1.14.0,<1.15.0)",
    "nbformat (>=5.10.4,<5.11.0)",
    "pydantic (>=2.8.2,<2.13.0)",
    "tyro (>=0.8.6,<1.1.0)",
    "pypowsybl-jupyter<1.4.0",
    "pandera<0.30.0",
    "beartype (>=0.22.0,<0.23.0)",
    "logbook (>=1.8.1,<1.9.0)",
    "confluent-kafka (>=2.10.0,<2.14.0)",
    "toop_engine_interfaces=={{ version }}",
    "toop_engine_grid_helpers=={{ version }}",
    "toop_engine_contingency_analysis=={{ version }}",
    "toop_engine_dc_solver=={{ version }}",
]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[dependency-groups]
dev = [
    "pep8-naming<0.16.0",
    "pre-commit<4.6.0",
    "pre-commit-hooks<6.1.0",
    "pytest<9.1.0",
    "pytest-cov<7.1.0",
    "pytest-dotenv<0.6.0",
    "pytest-mock<3.16.0",
    "pytest-timeout<2.5.0",
    "pytest-xdist>=3.8.0,<3.9.0",
    "ipykernel>=6.25.2,<7.3.0",
    "jupyter>=1.0.0,<1.2.0",
    "seaborn>=0.13.0,<0.14.0",
    "plotly>=3.0.0,<6.7.0",
    "openpyxl>=3.1.2,<3.2.0",
    "ruff<0.16.0",
    "types-confluent-kafka>=1.3.3,<1.5.0",
    "pytest-logbook>=1.2.0,<1.3.0",
    "pypowsybl-jupyter>=1.0.0,<1.4.0",
    "docker>=7.1.0,<7.2.0",
]

[tool.uv.sources]
toop_engine_interfaces = { path = "../interfaces_pkg", editable = true }
toop_engine_grid_helpers = { path = "../grid_helpers_pkg", editable = true }
toop_engine_contingency_analysis = { path = "../contingency_analysis_pkg", editable = true }
toop_engine_dc_solver = { path = "../dc_solver_pkg", editable = true }

[tool.uv-secure.ignore_packages]
ray = [] # Ignore issues with all versions of the ray package
